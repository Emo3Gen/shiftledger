services:
  - type: web
    name: shiftledger
    runtime: docker
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: EMOGEN_API_URL
        sync: false
      - key: EMOGEN_API_PASSWORD
        sync: false
      - key: PARAPLAN_LOGIN
        sync: false
      - key: PARAPLAN_PASSWORD
        sync: false
      - key: API_KEY
        sync: false
