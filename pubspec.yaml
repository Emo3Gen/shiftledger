    sdk: flutter
  intl: ^0.19.0
  provider: ^6.0.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
